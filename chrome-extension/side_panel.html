<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Better Questions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
  <style>
    /* ── Ticker: all spans left-aligned ── */
    .brand-headline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .brand-headline .brand-ask,
    .brand-headline .brand-rest {
      display: block;
      margin-left: 0;
      text-align: left;
    }

    /* ── Refresh button in results header ── */
    #refresh-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      width: 26px;
      height: 26px;
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    #refresh-btn:hover { border-color: #FFD700; color: #FFD700; }

    /* ── Not-article detection state (shown inside warmup shell) ── */
    #not-article {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .na-label {
      font-family: var(--font-serif);
      font-size: clamp(1rem, 2vw, 1.4rem);
      font-weight: 700;
      color: var(--slate-text);
      margin: 0;
    }
    .na-hint {
      font-size: 0.82rem;
      color: var(--slate-muted);
      margin: 0;
    }
    .na-btn {
      align-self: flex-start;
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      color: var(--slate-text);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .na-btn:hover { border-color: #FFD700; color: #FFD700; }

    /* ── Accordion item (matches extension content.js card style) ── */
    #items li {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.15s;
    }
    #items li:hover { border-color: rgba(255,255,255,0.22); }
    .abq-item { margin: 0; }
    .item-body {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 12px 10px;
    }
    .item-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      flex-shrink: 0;
    }
    .item-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
      padding: 0;
      transition: transform 0.2s ease-out, text-shadow 0.15s;
    }
    /* Arrow inherits the label colour */
    .label-Words  ~ .item-toggle { color: #FFD700; }
    .label-Proof  ~ .item-toggle { color: #50C878; }
    .label-Missing ~ .item-toggle { color: #FF6450; }
    /* Glow on card hover using the label colour */
    #items li:hover .item-toggle { text-shadow: 0 0 10px currentColor; }
    /* Rotate when hovering the toggle itself */
    .item-toggle:hover { transform: rotate(90deg); }
    /* Open state */
    .abq-item.open .item-toggle {
      transform: rotate(90deg);
      color: var(--yellow);
      text-shadow: 0 0 8px rgba(255,215,0,0.4);
    }
    .item-toggle:active { transform: rotate(90deg) scale(0.9); }
    .abq-item.open .item-toggle:active { transform: rotate(90deg) scale(0.9); }
    .item-label {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 2px 6px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .label-Words   { background: rgba(255,215,0,0.15);  color: #FFD700; }
    .label-Proof   { background: rgba(80,200,120,0.15); color: #50C878; }
    .label-Missing { background: rgba(255,100,80,0.15); color: #FF6450; }
    .item-text { font-size: 13px; font-weight: 600; color: var(--fg); line-height: 1.45; flex: 1; }
    .item-why  { display: none; font-size: 11px; color: var(--muted); line-height: 1.4; padding: 0 12px 10px; margin: 0; }
    .abq-item.open .item-why { display: block; }

    /* ── Focus-visible rings (keyboard nav) ── */
    .item-toggle:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
      border-radius: 3px;
    }
    .tab:focus-visible,
    #refresh-btn:focus-visible,
    .na-btn:focus-visible,
    #paste-submit:focus-visible {
      outline: 2px solid var(--yellow);
      outline-offset: 2px;
    }

    /* ── First-run intro ── */
    #intro {
      position: absolute;
      inset: 0;
      background: var(--slate-bg);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 28px;
      z-index: 100;
    }
    #intro.hidden { display: none; }
    .intro-body {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .intro-tagline {
      font-size: 13px;
      color: var(--slate-muted);
      margin: 0;
    }
    .intro-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0;
      margin: 0;
    }
    .intro-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--slate-muted);
    }

    /* ── Paste fallback ── */
    #paste-fallback {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .paste-hint { font-size: 11px; color: var(--muted); }
    #paste-input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 12px;
      line-height: 1.5;
      padding: 8px 10px;
      resize: vertical;
      min-height: 90px;
    }
    #paste-input:focus { outline: none; border-color: rgba(255,255,255,0.3); }
    #paste-submit {
      align-self: flex-start;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #paste-submit:hover { border-color: var(--yellow); color: var(--yellow); }

  </style>
</head>
<body>

  <!-- ── First-run intro (one-time, hidden after 'Got it') ── -->
  <div id="intro" class="hidden">
    <div class="intro-body">
      <h1 class="brand-headline">
        <span class="brand-ask">Ask</span>
        <span class="brand-rest">Better Questions</span>
      </h1>
      <p class="intro-tagline">Three lenses for every article:</p>
      <ul class="intro-list">
        <li><strong class="item-label label-Words">Words</strong> how labels and phrasing shape meaning</li>
        <li><strong class="item-label label-Proof">Proof</strong> what the text shows, checks, or assumes</li>
        <li><strong class="item-label label-Missing">Missing</strong> what standards or context go unstated</li>
      </ul>
      <button id="intro-btn" class="na-btn">Got it →</button>
    </div>
  </div>

  <!-- ── Warmup overlay (shown while Render is cold-starting) ── -->
  <div id="warmup">
    <div id="aurora-layer" aria-hidden="true"></div>
    <div class="wu-shell">
      <div class="wu-ticker">
        <div id="ticker-panel" class="ticker-panel"></div>
        <div id="not-article" class="hidden" aria-live="polite"></div>
      </div>
      <div class="wu-bar-row">
        <span class="wu-bar-label">Loading</span>
        <div class="wu-bar-track">
          <div id="wu-fill" class="wu-fill"></div>
          <div class="wu-shimmer" aria-hidden="true"></div>
        </div>
      </div>
      <p id="wu-status" class="wu-status" role="status" aria-live="polite">Starting up…</p>
    </div>
  </div>

  <!-- ── Main results (revealed when API responds) ── -->
  <div id="main" class="hidden">

    <header>
      <span class="logo">Ask Better<br>Questions</span>
      <span id="status-inline" class="status-inline hidden" role="status" aria-live="polite"></span>
      <button id="refresh-btn" aria-label="Re-analyze this page" title="Re-analyze this page">↻</button>
    </header>

    <div id="error" class="error hidden" role="alert"></div>

    <!-- Paste fallback (shown after URL extraction errors) -->
    <div id="paste-fallback" class="hidden"></div>

    <!-- Choice panel (hub / multi-story pages) -->
    <div id="choice-panel" class="hidden">
      <p class="choice-prompt" id="choice-legend">This page has multiple articles. Pick one:</p>
      <ul id="candidate-list" aria-labelledby="choice-legend"></ul>
    </div>

    <!-- Results -->
    <div id="results" class="hidden">
      <div class="tabs-row">
        <div class="tabs" role="tablist">
          <button class="tab active" data-tab="fast"   role="tab" aria-selected="true"  tabindex="0">Questions</button>
          <button class="tab"        data-tab="deeper" role="tab" aria-selected="false" tabindex="-1">Curious</button>
          <button class="tab"        data-tab="cliff"  role="tab" aria-selected="false" tabindex="-1">Answers</button>
        </div>
        <button id="info-btn" class="tab info-tab" aria-label="About" title="About">ⓘ</button>
      </div>
      <ul id="items"></ul>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="side_panel.js"></script>
</body>
</html>
